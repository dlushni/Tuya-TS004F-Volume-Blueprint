blueprint:
  name: "ZHA - TS004F Knob Volume Control"
  description: >
    Control main and secondary media player volumes, and toggle play/pause using a Tuya TS004F knob (Dimmer Mode).
  domain: automation
  input:
    controller:
      name: Controller
      description: The ZHA device creating events.
      selector:
        device:
          integration: zha
          manufacturer: _TZ3000_qja6nq5z
          model: TS004F
    main_volume:
      name: Main Volume (Speaker)
      description: The main volume controlled with normal left/right rotations.
      selector:
        entity:
          domain: media_player
    secondary_volume:
      name: Secondary Volume (Player)
      description: The secondary volume controlled with left/right rotations when the knob is pressed down. (Optional)
      default: ""
      selector:
        entity:
          domain: media_player
    pause_player:
      name: Play/Pause Player
      description: The media player to toggle (play/pause) when the knob is clicked.
      selector:
        entity:
          domain: media_player
    volume_scale:
      name: Step Size Scaling
      description: >
        Multiplier for the volume step. By default (1.0), a rotation distance of 13 equals a 1% volume change.
      default: 1.0
      selector:
        number:
          min: 0.1
          max: 10.0
          step: 0.1
          mode: box

mode: queued
max: 10

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input controller

action:
  - variables:
      command: "{{ trigger.event.data.command }}"

  - choose:
      # ========================================
      # 1. SHORT CLICK (PLAY / PAUSE)
      # ========================================
      - conditions:
          - condition: template
            value_template: "{{ command == 'toggle' }}"
        sequence:
          - action: media_player.media_play_pause
            target:
              entity_id: !input pause_player

      # ========================================
      # 2. STANDARD ROTATION (MAIN SPEAKER)
      # ========================================
      - conditions:
          - condition: template
            value_template: "{{ command == 'step' }}"
        sequence:
          - variables:
              scale: !input volume_scale
              player: !input main_volume
              # Because this sequence only runs on 'step', we know args[0] and args[1] exist safely
              step_mode: "{{ trigger.event.data.args[0] | int }}"
              step_size: "{{ trigger.event.data.args[1] | float }}"
              # ACCELERATION MATH. Cap base at 13, floor excess at 0
              step_pct: >
                {% set base = [step_size, 13.0] | min %}
                {% set excess = [step_size - 13.0, 0.0] | max %}
                {{ ((base / 13.0) * 0.01) + ((excess / 13.0) * 0.01 * (scale | float)) }}
              current_vol: "{{ state_attr(player, 'volume_level') | float(0) }}"
              
          - choose:
              # Rotate Right (UP)
              - conditions:
                  - condition: template
                    value_template: "{{ step_mode == 0 }}"
                sequence:
                  - action: media_player.volume_set
                    target:
                      entity_id: "{{ player }}"
                    data:
                      volume_level: "{{ [ current_vol + step_pct, 1.0 ] | min }}"
                      
              # Rotate Left (DOWN)
              - conditions:
                  - condition: template
                    value_template: "{{ step_mode == 1 }}"
                sequence:
                  - action: media_player.volume_set
                    target:
                      entity_id: "{{ player }}"
                    data:
                      volume_level: "{{ [ current_vol - step_pct, 0.0 ] | max }}"

      # ========================================
      # 3. PRESSED ROTATION (SECONDARY SPEAKER)
      # ========================================
      - conditions:
          - condition: template
            value_template: "{{ command == 'step_color_temp' }}"
        sequence:
          - variables:
              player: !input secondary_volume
              
          # Abort if no secondary speaker was defined in the UI
          - condition: template
            value_template: "{{ player != '' }}"
            
          - variables:
              scale: !input volume_scale
              step_mode: "{{ trigger.event.data.args[0] | int }}"
              step_size: "{{ trigger.event.data.args[1] | float }}"
              # ACCELERATION MATH. Cap base at 13, floor excess at 0
              step_pct: >
                {% set base = [step_size, 18.0] | min %}
                {% set excess = [step_size - 18.0, 0.0] | max %}
                {{ ((base / 18.0) * 0.01) + ((excess / 18.0) * 0.01 * (scale | float)) }}
              current_vol: "{{ state_attr(player, 'volume_level') | float(0) }}"
              
          - choose:
              # Press & Rotate Right (UP)
              - conditions:
                  - condition: template
                    value_template: "{{ step_mode == 1 }}"
                sequence:
                  - action: media_player.volume_set
                    target:
                      entity_id: "{{ player }}"
                    data:
                      volume_level: "{{ [ current_vol + step_pct, 1.0 ] | min }}"
                      
              # Press & Rotate Left (DOWN)
              - conditions:
                  - condition: template
                    value_template: "{{ step_mode == 3 }}"
                sequence:
                  - action: media_player.volume_set
                    target:
                      entity_id: "{{ player }}"
                    data:
                      volume_level: "{{ [ current_vol - step_pct, 0.0 ] | max }}"
